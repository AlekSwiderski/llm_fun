{% extends 'base.html' %}
{% block content %}
<h1>Transactions</h1>
<table>
    <tr><th>Date</th><th>Category</th><th>Amount</th><th>Description</th></tr>
    {% for t in transactions %}
    <tr>
        <td>{{ t.date }}</td>
        <td>{{ t.category }}</td>
        <td>{{ t.amount }}</td>
        <td>{{ t.description }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
