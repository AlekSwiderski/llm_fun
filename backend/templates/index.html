{% extends 'base.html' %}
{% block content %}
<h1>Transactions</h1>
<p><a href="{{ url_for('add_transaction') }}">Add Transaction</a></p>
<table>
    <tr>
        <th>Date</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Description</th>
        <th></th>
        <th></th>
    </tr>
    {% for t in transactions %}
    <tr>
        <td>{{ t.date }}</td>
        <td>{{ t.category }}</td>
        <td>{{ t.amount }}</td>
        <td>{{ t.description }}</td>
        <td><a href="{{ url_for('edit_transaction', tx_id=t.id) }}">Edit</a></td>
        <td><a href="{{ url_for('delete_transaction', tx_id=t.id) }}">Delete</a></td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
